name: Payments — подтверждение оплат

on:
  schedule:
    - cron: "*/5 * * * *"   # каждые 5 минут
  workflow_dispatch:

jobs:
  process-payments:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Установка зависимостей
        run: pip install -r requirements.txt

      - name: Обработка платежей и настроек
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          MINI_APP_URL: ${{ secrets.MINI_APP_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PAYMENT_PROVIDER_TOKEN: ${{ secrets.PAYMENT_PROVIDER_TOKEN }}
        run: |
          cd bot
          timeout 55 python main.py payments || true

      - name: Сохранение данных пользователей
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: update user subscriptions [skip ci]"
          git push
